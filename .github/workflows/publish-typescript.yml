name: Publish TypeScript Library

on:
  push:
    tags:
      - 'typescript-v*'
  workflow_dispatch:

jobs:
  build-n-publish:
    name: Build and publish TypeScript library to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # registry-url intentionally omitted: setting it causes setup-node to
          # inject a NODE_AUTH_TOKEN-based .npmrc which conflicts with OIDC auth.
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Publish to npm
        # Use npm directly (not pnpm) — pnpm does not forward the OIDC
        # environment to npm, so trusted publishing token exchange fails.
        # Provenance is generated automatically when publishing via OIDC.
        run: npm publish --access public
        working-directory: packages/typescript

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
