name: Publish TypeScript Library

on:
  push:
    tags:
      - 'typescript-v*'
  workflow_dispatch:

jobs:
  build-n-publish:
    name: Build and publish TypeScript library to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # registry-url intentionally omitted: setting it causes setup-node to
          # inject a NODE_AUTH_TOKEN-based .npmrc which conflicts with OIDC auth.
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Publish to npm
        # No NODE_AUTH_TOKEN needed — OIDC trusted publishing handles auth.
        # Provenance is generated automatically when publishing via OIDC;
        # --provenance flag is not required (and should not be passed).
        run: pnpm publish --no-git-checks --access public
        working-directory: packages/typescript

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
