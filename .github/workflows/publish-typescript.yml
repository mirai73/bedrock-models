name: Publish TypeScript Library

on:
  push:
    tags:
      - 'typescript-v*'
  workflow_dispatch:

jobs:
  build-n-publish:
    name: Build and publish TypeScript library to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read   # no release creation needed here; release.yml owns that
      id-token: write  # Required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Upgrade npm to support OIDC trusted publishing (requires >=11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Publish to npm
        # NODE_AUTH_TOKEN is blanked so setup-node's injected .npmrc token does
        # not take precedence. npm >=11.5.1 detects the OIDC environment via
        # ACTIONS_ID_TOKEN_REQUEST_URL / ACTIONS_ID_TOKEN_REQUEST_TOKEN and
        # exchanges it for a short-lived publish token automatically.
        # Provenance is generated automatically when publishing via OIDC.
        run: npm publish --access public
        working-directory: packages/typescript
        env:
          NODE_AUTH_TOKEN: ""


