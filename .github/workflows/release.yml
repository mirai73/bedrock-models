name: Release to PyPI

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true
      
      - name: Copy shared JSON and metadata files
        run: |
          rm -f packages/python/bedrock_models/bedrock_models.json
          cp packages/shared/bedrock_models.json packages/python/bedrock_models/bedrock_models.json
          rm -f packages/python/bedrock_models/bedrock_models_metadata.json
          cp packages/shared/bedrock_models_metadata.json packages/python/bedrock_models/bedrock_models_metadata.json
      
      - name: Install dependencies
        run: |
          cd packages/python
          poetry install --no-interaction
      
      - name: Run tests
        run: |
          cd packages/python
          poetry run pytest tests/
      
      - name: Build package
        run: |
          cd packages/python
          poetry build
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist/
      
      - name: Install kiro-cli
        run: |
          curl -fsSL https://cli.kiro.dev/install | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      
      - name: Generate AI release notes
        id: ai_notes
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_AUTH_TOKEN }}
        run: |
          NOTES="$(scripts/gen_release_notes.sh)"
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: packages/python/dist/*
          body: ${{ steps.ai_notes.outputs.notes }}
          generate_release_notes: true
